@if (booting()) {
<app-boot-splash (finished)="finishBoot()" />
}

<div class="shell" (pointerdown)="unlockSound()">
  <app-depth-scene />
  <div
    class="scene-stage"
    [class.scene-stage-ready]="!booting()"
    [attr.aria-hidden]="booting() ? 'true' : null"
  >
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" routerLink="/projects" aria-label="AJ Mock Hub projects">
        <span class="brand-mark">
          <img src="aj-mock-hub-mark.svg" alt="" width="42" height="42" />
        </span>
        <span class="brand-copy">
          <strong>{{ title }}</strong>
          <small>Angular prototype studio</small>
        </span>
      </a>

      <div class="nav-links" aria-label="Workspace navigation">
        <a
          class="nav-link"
          routerLink="/projects"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <svg aria-hidden="true" viewBox="0 0 20 20">
            <rect x="3" y="3" width="5" height="5" rx="1.25" />
            <rect x="12" y="3" width="5" height="5" rx="1.25" />
            <rect x="3" y="12" width="5" height="5" rx="1.25" />
            <rect x="12" y="12" width="5" height="5" rx="1.25" />
          </svg>
          <span>Projects</span>
        </a>
        <a
          class="nav-link"
          routerLink="/projects/new"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <svg aria-hidden="true" viewBox="0 0 20 20">
            <path d="M10 4.25v11.5M4.25 10h11.5" />
          </svg>
          <span>New project</span>
        </a>
        <a
          class="nav-link"
          routerLink="/health"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <svg aria-hidden="true" viewBox="0 0 20 20">
            <path d="M3.5 10h2.3l1.5-4 3 8 1.8-5 1.2 1h3.2" />
          </svg>
          <span>Health</span>
        </a>
      </div>

      <div class="nav-actions">
        <span class="workspace-status"><i></i> Local workspace</span>
        <button
          class="sound-toggle"
          type="button"
          [attr.aria-label]="soundEnabled() ? 'Mute navigation sounds' : 'Enable navigation sounds'"
          [attr.aria-pressed]="soundEnabled()"
          (click)="toggleSound($event)"
        >
          <svg aria-hidden="true" viewBox="0 0 20 20">
            <path d="M4 8h3l3.8-3v10L7 12H4z" />
            @if (soundEnabled()) {
            <path class="sound-wave" d="M13.1 7.2a4 4 0 0 1 0 5.6" />
            <path class="sound-wave" d="M15.3 5.1a7 7 0 0 1 0 9.8" />
            } @else {
            <path class="sound-wave" d="m13.2 8 3.8 4m0-4-3.8 4" />
            }
          </svg>
        </button>
      </div>
    </nav>
    <main [class.route-entering]="routeEntering()">
      <router-outlet></router-outlet>
    </main>
    <footer class="site-footer">
      <div>
        <span class="footer-mark">
          <img src="aj-mock-hub-mark.svg" alt="" width="32" height="32" />
        </span>
        <span>
          <strong>AJ Mock Hub</strong>
          <small>From requirements to reviewable Angular prototypes.</small>
        </span>
      </div>
      <p>Local-first workspace · Built for immutable iteration</p>
    </footer>
  </div>
</div>
