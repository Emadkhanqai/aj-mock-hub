<div
  class="shell"
  (pointerdown)="unlockSound()"
  (pointermove)="moveParallax($event)"
  (pointerleave)="resetParallax()"
>
  <div #ambientOne class="ambient ambient-one" aria-hidden="true"></div>
  <div #ambientTwo class="ambient ambient-two" aria-hidden="true"></div>
  <div class="grid-plane" aria-hidden="true"></div>
  <div class="scene-stage">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="/" aria-label="AJ Mock Hub home">
        <span class="brand-mark">
          <img src="aj-mock-hub-mark.svg" alt="" width="42" height="42" />
        </span>
        <span class="brand-copy">
          <strong>{{ title }}</strong>
          <small>Angular prototype studio</small>
        </span>
      </a>
      <div class="nav-status">
        <span class="milestone"><i></i> Local workspace</span>
        <button
          class="sound-toggle"
          type="button"
          [attr.aria-label]="soundEnabled() ? 'Mute navigation sounds' : 'Enable navigation sounds'"
          [attr.aria-pressed]="soundEnabled()"
          (click)="toggleSound($event)"
        >
          <span aria-hidden="true">{{ soundEnabled() ? '◖))' : '◖×' }}</span>
        </button>
      </div>
    </nav>
    <main [class.route-entering]="routeEntering()">
      <router-outlet></router-outlet>
    </main>
    <footer class="site-footer">
      <div>
        <span class="footer-mark">
          <img src="aj-mock-hub-mark.svg" alt="" width="32" height="32" />
        </span>
        <span>
          <strong>AJ Mock Hub</strong>
          <small>From requirements to reviewable Angular prototypes.</small>
        </span>
      </div>
      <p>Local-first workspace · Built for immutable iteration</p>
    </footer>
  </div>
</div>
